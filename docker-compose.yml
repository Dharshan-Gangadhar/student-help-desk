version: '3.8'

services:
  backend:
    build:
      context: ./backend # This tells it to use the backend Dockerfile you already made
    container_name: helpdesk-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend # This tells it to use the frontend Dockerfile you already made
    container_name: helpdesk-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
